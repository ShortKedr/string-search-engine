name: .NET Core Desktop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Restore the solution
    - name: Restore the solution
      run: dotnet restore StringSearchEngine.sln

    # Build the solution
    - name: Build the solution
      run: dotnet build StringSearchEngine.sln --configuration ${{ matrix.configuration }} --no-restore

    # Execute all unit tests in the solution
    - name: Execute unit tests
      run: dotnet test StringSearchEngine.sln --configuration ${{ matrix.configuration }} --no-build --verbosity normal
